corpus:
  raw_dir: "corpus/raw"
  cleaned_dir: "corpus/cleaned"
  metadata_file: "corpus/metadata.json"
  gatsby_gutenberg_url: "https://www.gutenberg.org/cache/epub/64317/pg64317.txt"

ner:
  # Strategy B: "mistral_joint" = joint NER+relations via Ollama (default)
  # Legacy:     "corener"       = CoReNer NER then separate Mistral relations
  backend: "mistral_joint"

  corener_model: "aiola/roberta-large-corener"  # used by legacy backend + coref stage
  max_chunk_tokens: 350                # max subword tokens per chunk (RoBERTa limit 512)
  skip_phase2b_coref: false           # false in Strategy B so coref runs after Mistral
  spacy_model: "en_core_web_lg"        # still used by downstream stages
  entity_types: ["GPE", "LOC", "FAC"]
  fictional_overrides: ["East Egg", "West Egg", "Valley of Ashes"]
  confidence_threshold: 0.7
  batch_size: 64
  min_mention_count: 2

grounding:
  geocoder: "nominatim"
  user_agent: "fitzgerald_geo_project"
  cache_file: "data/geocode_cache.json"
  default_country_bias: ""
  rate_limit_sleep: 1.1

relations:
  # Progress and checkpoint files (written by phase 4, read by dashboard)
  progress_file: "phase4_progress.json"
  checkpoint_file: "phase4_checkpoint.json"

  mistral:
    model: "mistral"                  # ollama model name (e.g. mistral, mistral:7b-instruct)
    host: "http://localhost:11434"    # ollama server address
    temperature: 0.1                  # low temp = consistent structured output
    timeout_seconds: 120              # per-chunk request timeout
    max_retries: 3                    # attempts before skipping a chunk
    sentences_per_chunk: 6            # sentences fed per Mistral call
    chunk_overlap: 2                  # overlap to avoid missing cross-boundary relations
    min_confidence: 0.55              # discard relations below this threshold

constraints:
  epsilon_direction_km: 1.0
  d_near_km: 10.0
  d_far_km: 50.0
  sigma_distance_km: 5.0
  co_occurrence_weight: 0.1
  projection_origin_lat: 40.7128
  projection_origin_lon: -74.0060
  min_constraints_per_latent: 1

inference:
  method: "emcee"
  num_samples: 5000
  burn_in: 1000
  thin: 5
  beta: 1.0
  proposal_std_km: 10.0
  init_bbox_radius_km: 300.0
  num_walkers: 32
  num_chains: 4
  random_seed: 42

visualization:
  output_dir: "visualizations"
  map_zoom: 10
  heatmap_resolution: 100
  ensemble_num_samples: 50
  map_tiles: "OpenStreetMap"
